<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aphasia Recovery Hub</title>
    <style>
        :root {
            --red: #ff6b6b; --yellow: #ffd93d; --blue: #4cc9f0; --green: #6a994e; --purple: #a29bfe; --sky: #a7d8f5;
        }
        body {
            font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            transition: background-color 0.5s; background-color: var(--sky);
        }
        .container { width: 95%; max-width: 600px; z-index: 10; text-align: center; }
        .screen { display: none; } .active { display: block; }
        .activity-box {
            display: flex; align-items: center; width: 100%; padding: 25px;
            margin: 15px 0; border-radius: 25px; border: 4px solid white;
            cursor: pointer; font-size: 1.6rem; font-weight: 800; color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .game-card {
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .image-display { font-size: 120px; margin: 10px 0; }
        .progress-bar { width: 100%; height: 15px; background: #ddd; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        #progress-fill, #match-progress-fill { width: 0%; height: 100%; background: #2ecc71; transition: width 0.3s; }
        .attempt-btn {
            background: var(--blue); color: white; border: none; padding: 20px 40px;
            border-radius: 50px; font-size: 1.4rem; font-weight: bold;
            cursor: pointer; width: 100%; margin-top: 20px;
        }
        .listening { background: #e74c3c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .match-option { 
            background: white; padding: 20px; border-radius: 15px; 
            border: 3px solid #ddd; cursor: pointer; font-weight: bold;
            transition: transform 0.1s;
        }
        .match-option:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div id="home-screen" class="screen active">
            <h1 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">Recovery Hub</h1>
            <button class="activity-box" style="background: var(--red)" onclick="start('general')">🍎 Word Practice</button>
            <button class="activity-box" style="background: var(--yellow); color: #333;" onclick="start('actions')">🏃 Action Words</button>
            <button class="activity-box" style="background: var(--blue)" onclick="start('kitchen')">🍴 Kitchen Items</button>
            <button class="activity-box" style="background: var(--green)" onclick="start('places')">🏥 Places</button>
            <button class="activity-box" style="background: var(--purple)" onclick="startMatchGame()">🧩 Picture Match</button>
        </div>

        <div id="practice-screen" class="screen">
            <div class="game-card">
                <div class="progress-bar"><div id="progress-fill"></div></div>
                <div id="counter">1 / 12</div>
                <div id="display-emoji" class="image-display">🍎</div>
                <h2 id="target-text">APPLE</h2>
                <button id="attempt-btn" class="attempt-btn">Click to Attempt</button>
                <div id="feedback" style="margin-top:20px; font-weight: bold; min-height: 25px;"></div>
                <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; text-decoration:underline; color:#999; cursor:pointer;">Exit</button>
            </div>
        </div>

        <div id="match-screen" class="screen">
            <div class="game-card">
                <div class="progress-bar"><div id="match-progress-fill"></div></div>
                <div id="match-counter">1 / 12</div>
                <div id="match-emoji" class="image-display">🍎</div>
                <div class="match-grid" id="match-options"></div>
                <button onclick="location.reload()" style="margin-top:30px; background:none; border:none; text-decoration:underline; color:#999; cursor:pointer;">Exit</button>
            </div>
        </div>
    </div>

    <script>
        const library = {
            general: [{w:'apple', e:'🍎'}, {w:'banana', e:'🍌'}, {w:'cat', e:'🐱'}, {w:'dog', e:'🐶'}, {w:'sun', e:'☀️'}, {w:'book', e:'📖'}, {w:'car', e:'🚗'}, {w:'tree', e:'🌳'}, {w:'fish', e:'🐟'}, {w:'hat', e:'🎩'}, {w:'star', e:'⭐'}, {w:'ball', e:'⚽'}],
            actions: [{w:'run', e:'🏃'}, {w:'sit', e:'🪑'}, {w:'sleep', e:'😴'}, {w:'eat', e:'🍽️'}, {w:'walk', e:'🚶'}, {w:'jump', e:'🦘'}, {w:'dance', e:'💃'}, {w:'swim', e:'🏊'}, {w:'read', e:'📖'}, {w:'sing', e:'🎤'}, {w:'wave', e:'👋'}, {w:'climb', e:'🧗'}],
            kitchen: [{w:'fork', e:'🍴'}, {w:'spoon', e:'🥄'}, {w:'knife', e:'🔪'}, {w:'plate', e:'🍽️'}, {w:'cup', e:'☕'}, {w:'bowl', e:'🥣'}, {w:'pot', e:'🍲'}, {w:'pan', e:'🍳'}, {w:'fridge', e:'❄️'}, {w:'sink', e:'🚰'}, {w:'salt', e:'🧂'}, {w:'bread', e:'🍞'}],
            places: [{w:'office', e:'🏢'}, {w:'school', e:'🏫'}, {w:'zoo', e:'🦁'}, {w:'market', e:'🛒'}, {w:'party', e:'🥳'}, {w:'beach', e:'🏖️'}, {w:'park', e:'🌳'}, {w:'bank', e:'🏦'}, {w:'gym', e:'🏋️'}, {w:'farm', e:'🚜'}, {w:'airport', e:'✈️'}, {w:'hospital', e:'🏥'}]
        };

        let currentSession = [], index = 0, isListening = false;
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        let rec = new Speech();
        rec.continuous = false;
        rec.interimResults = false;

        const attemptBtn = document.getElementById('attempt-btn');
        const feedback = document.getElementById('feedback');

        function showScreen(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        // --- SPEECH PRACTICE LOGIC ---
        function start(cat) {
            document.body.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue(`--${cat === 'actions' ? 'yellow' : (cat === 'general' ? 'red' : cat)}`).trim() || '#a7d8f5';
            currentSession = [...library[cat]].sort(() => 0.5 - Math.random()).slice(0, 12);
            index = 0; showScreen('practice-screen'); loadWord();
        }

        function loadWord() {
            const item = currentSession[index];
            document.getElementById('display-emoji').textContent = item.e;
            document.getElementById('target-text').textContent = item.w.toUpperCase();
            document.getElementById('counter').textContent = `${index + 1} / 12`;
            document.getElementById('progress-fill').style.width = ((index + 1) / 12 * 100) + "%";
            feedback.textContent = "";
            attemptBtn.textContent = "Click to Attempt";
            attemptBtn.className = "attempt-btn";
            isListening = false;
        }

        attemptBtn.onclick = () => {
            if (!isListening) {
                try {
                    rec.start();
                    isListening = true;
                    attemptBtn.textContent = "Listening...";
                    attemptBtn.classList.add('listening');
                } catch (e) { rec.stop(); isListening = false; }
            } else {
                rec.stop();
                isListening = false;
            }
        };

        rec.onresult = (e) => {
            const heard = e.results[0][0].transcript.toLowerCase();
            const target = currentSession[index].w;
            if (heard.includes(target)) {
                feedback.textContent = "Correct! ✅"; feedback.style.color = "green";
                setTimeout(() => { 
                    index++; 
                    if (index < 12) loadWord(); 
                    else location.reload(); 
                }, 1200);
            } else {
                feedback.textContent = `Heard: "${heard}". Try again!`;
                feedback.style.color = "orange";
            }
        };

        rec.onend = () => { 
            isListening = false; 
            attemptBtn.classList.remove('listening'); 
            if(feedback.textContent === "") attemptBtn.textContent = "Click to Attempt";
        };

        // --- PICTURE MATCH LOGIC ---
        function startMatchGame() {
            document.body.style.backgroundColor = "var(--purple)";
            // Combine all items and pick 12
            const allItems = [...library.general, ...library.actions, ...library.kitchen, ...library.places];
            currentSession = allItems.sort(() => 0.5 - Math.random()).slice(0, 12);
            index = 0;
            showScreen('match-screen');
            loadMatchRound();
        }

        function loadMatchRound() {
            const correctItem = currentSession[index];
            document.getElementById('match-emoji').textContent = correctItem.e;
            document.getElementById('match-counter').textContent = `${index + 1} / 12`;
            document.getElementById('match-progress-fill').style.width = ((index + 1) / 12 * 100) + "%";

            // Get 3 random wrong words
            let options = [correctItem.w];
            const allWords = [...library.general, ...library.actions, ...library.kitchen, ...library.places].map(i => i.w);
            
            while(options.length < 4) {
                let randomWord = allWords[Math.floor(Math.random() * allWords.length)];
                if(!options.includes(randomWord)) options.push(randomWord);
            }

            // Shuffle options
            options.sort(() => 0.5 - Math.random());

            const grid = document.getElementById('match-options');
            grid.innerHTML = '';
            
            options.forEach(word => {
                const btn = document.createElement('div');
                btn.className = 'match-option';
                btn.textContent = word.toUpperCase();
                btn.onclick = () => {
                    if(word === correctItem.w) {
                        btn.style.backgroundColor = "#2ecc71";
                        btn.style.color = "white";
                        setTimeout(() => {
                            index++;
                            if(index < 12) loadMatchRound();
                            else location.reload();
                        }, 600);
                    } else {
                        btn.style.borderColor = "red";
                        btn.style.color = "red";
                    }
                };
                grid.appendChild(btn);
            });
        }
    </script>
</body>
</html>
